experimentName: code-coverage-v2
defaultModel: claude-sonnet-4-6
timeoutMinutes: 45

# Skills variants require spring-testing-skills installed to ~/.claude/skills/
# before running. See plans/ROADMAP.md Stage 3 for install/uninstall protocol.
# skillsInstall: true triggers pre-run installation from ~/community/spring-testing-skills/

variants:
  - name: simple
    promptFile: prompts/v0-simple.txt
    knowledgeDir: null
    knowledgeFiles: []

  - name: hardened
    promptFile: prompts/v1-hardened.txt
    knowledgeDir: null
    knowledgeFiles: []

  - name: hardened+kb
    promptFile: prompts/v1-hardened.txt
    knowledgeDir: knowledge
    knowledgeFiles:
      - index.md

  - name: hardened+skills
    promptFile: prompts/v1-hardened.txt
    knowledgeDir: null
    knowledgeFiles: []
    skillsInstall: true

  - name: hardened+preanalysis
    promptFile: prompts/v1-hardened-preanalysis.txt
    knowledgeDir: null
    knowledgeFiles: []

  - name: hardened+skills+preanalysis
    promptFile: prompts/v1-hardened-preanalysis.txt
    knowledgeDir: null
    knowledgeFiles: []
    skillsInstall: true

  - name: hardened+skills+preanalysis+plan-act
    promptFile: prompts/v3-explore.txt
    actPromptFile: prompts/v3-act.txt
    knowledgeDir: null
    knowledgeFiles: []
    skillsInstall: true
